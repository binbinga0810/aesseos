<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AESSEOS · 5가든 (가꾸는 창)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Gowun+Batang:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--frame:#7c5836;--frame-d:#5a3f25;--frame-l:#9a7048;--cream:#FFF7E5;--ink-soft:#b8a48e;--terra:#E8916B}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Gowun Batang',serif;color:var(--cream);background:radial-gradient(120% 90% at 50% 0%,#2e2822 0%,#1c1814 70%,#141210 100%);background-attachment:fixed;display:flex;align-items:center;justify-content:center;padding:14px}
.phone{width:394px;max-width:100%;height:850px;max-height:97vh;background:#171310;border-radius:42px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 30px 70px -20px rgba(0,0,0,.7),0 2px 0 rgba(255,255,255,.05) inset}
.statusbar{height:28px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft)}
.statusbar .dot{display:flex;gap:4px}.statusbar .dot i{width:5px;height:5px;border-radius:50%;background:var(--ink-soft);opacity:.5;display:inline-block}
.appbar{flex:none;padding:2px 22px 6px;display:flex;align-items:flex-end;justify-content:space-between}
.appbar .brand{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--terra);text-transform:uppercase}
.appbar h1{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--cream);line-height:1.15}
.appbar .stat{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-soft);line-height:1.6}
.appbar .stat b{color:var(--terra)}

.win-wrap{position:relative;margin:2px 14px 0;flex:1 1 auto;min-height:0;display:flex}
.win{position:relative;flex:1;border-radius:16px 16px 9px 9px;overflow:hidden;box-shadow:0 18px 44px -14px rgba(0,0,0,.85)}
.win video,.win img.base{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
canvas{display:block;width:100%;height:100%;position:relative;z-index:1}
/* emphasized picture-window frame */
.frame{position:absolute;inset:0;pointer-events:none;border-radius:20px 20px 11px 11px;z-index:2}
.frame .outer{position:absolute;inset:0;border:15px solid var(--frame);border-radius:20px 20px 11px 11px;box-shadow:0 0 0 2px var(--frame-d) inset,0 0 0 3px var(--frame-d),0 5px 0 var(--frame-l) inset,0 -3px 0 rgba(0,0,0,.25) inset}
.frame .corner{position:absolute;width:15px;height:15px;background:var(--frame-l);opacity:.5}
.frame .corner.tl{top:0;left:0}.frame .corner.tr{top:0;right:0}.frame .corner.bl{bottom:0;left:0}.frame .corner.br{bottom:0;right:0}
.frame .glass{position:absolute;inset:15px;border-radius:5px;background:linear-gradient(125deg,rgba(255,255,255,.16) 0%,rgba(255,255,255,.04) 18%,rgba(255,255,255,0) 34%,rgba(255,255,255,0) 66%,rgba(255,255,255,.05) 84%,rgba(255,255,255,.12) 100%)}
.frame .gleam{position:absolute;top:15px;left:18%;width:30%;height:42%;border-radius:0 0 60% 0;background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,0) 70%);transform:skewX(-12deg)}
.frame .sill{position:absolute;left:-7px;right:-7px;bottom:-11px;height:22px;border-radius:5px;background:linear-gradient(180deg,var(--frame-l),var(--frame) 50%,var(--frame-d));box-shadow:0 10px 18px -6px rgba(0,0,0,.75)}
/* 창턱 위 커피잔 (소품 — 절제, 김 모락모락) */
.cup{position:absolute;left:20px;bottom:-2px;width:34px;height:30px;z-index:4}
.cup .body{position:absolute;bottom:0;left:3px;width:26px;height:21px;background:#ECE3D2;border-radius:3px 3px 7px 7px;box-shadow:inset -3px 0 4px rgba(0,0,0,.12),0 2px 4px rgba(0,0,0,.3)}
.cup .body::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:#3E2C1E;border-radius:3px 3px 0 0}
.cup .handle{position:absolute;bottom:6px;right:-1px;width:9px;height:12px;border:2.5px solid #ECE3D2;border-left:none;border-radius:0 7px 7px 0}
.cup .saucer{position:absolute;bottom:-2px;left:-2px;width:36px;height:5px;background:#DDD3C0;border-radius:50%}
.cup .steam{position:absolute;bottom:21px;width:2.5px;height:14px;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0));border-radius:2px;filter:blur(.8px);opacity:0}
.cup .steam.s1{left:9px;animation:steam 3.2s ease-in infinite}
.cup .steam.s2{left:15px;height:17px;animation:steam 3.2s ease-in infinite 1.05s}
.cup .steam.s3{left:21px;animation:steam 3.2s ease-in infinite 2.1s}
@keyframes steam{0%{opacity:0;transform:translateY(0) translateX(0) scaleY(.6)}25%{opacity:.65}60%{opacity:.4;transform:translateY(-9px) translateX(2px) scaleY(1)}100%{opacity:0;transform:translateY(-16px) translateX(-1px) scaleY(1.1)}}
.pot{position:absolute;bottom:-1px;right:26px;width:34px;height:30px;z-index:3;pointer-events:none}
.pot .b{position:absolute;bottom:0;left:4px;width:24px;height:15px;background:linear-gradient(180deg,#b9694a,#8c4a30);border-radius:3px 3px 5px 5px}
.pot .l{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:28px;height:22px;background:radial-gradient(circle at 40% 30%,#7fa860,#4f7340);border-radius:60% 60% 40% 40%}
.cap{position:absolute;left:22px;right:22px;bottom:22px;z-index:4;text-align:center;pointer-events:none}
.cap span{display:inline-block;background:rgba(20,16,12,.62);backdrop-filter:blur(3px);color:#fff;font-size:12.5px;padding:7px 15px;border-radius:18px;opacity:0;transition:.6s;transform:translateY(6px);box-shadow:0 6px 16px -6px rgba(0,0,0,.6)}
.cap.show span{opacity:1;transform:translateY(0)}
.toast{position:absolute;left:50%;top:14px;transform:translateX(-50%) translateY(-8px);z-index:5;opacity:0;transition:.5s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast span{display:inline-block;background:rgba(255,247,229,.95);color:#6B1F2E;font-size:12px;font-weight:700;padding:7px 16px;border-radius:18px;box-shadow:0 8px 20px -8px rgba(0,0,0,.5)}

.rich{margin:8px 16px 0;flex:none;display:flex;align-items:center;gap:10px}
.rich .bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden}
.rich .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#8FA888,#E8916B);transition:width .8s}
.rich .lv{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-soft);white-space:nowrap}

.gardens{display:flex;gap:4px;margin:8px 14px 0;flex:none}
.gd{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:6px 1px 5px;text-align:center;cursor:pointer;transition:.18s;color:var(--ink-soft);position:relative}
.gd.on{background:rgba(232,145,107,.16);border-color:rgba(232,145,107,.5);color:var(--cream)}
.gd .i{font-size:16px;display:block;line-height:1}.gd .t{font-size:8.5px;margin-top:3px}
.gd .badge{position:absolute;top:-4px;right:-2px;width:7px;height:7px;border-radius:50%;background:var(--terra);display:none}
.gd.has-luck .badge{display:block}

.tabs{display:flex;gap:6px;margin:8px 16px 0;flex:none}
.tab{flex:1;font-family:'IBM Plex Mono',monospace;font-size:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--ink-soft);border-radius:16px;padding:6px 0;cursor:pointer;transition:.15s;letter-spacing:.5px}
.tab.on{background:var(--cream);color:#1c1814;border-color:var(--cream)}
.panel{margin:8px 16px 0;flex:none;height:120px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel::-webkit-scrollbar{display:none}
.sect{display:none}.sect.on{display:block}
.sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--ink-soft);text-transform:uppercase;margin:0 0 8px}
.row{display:flex;gap:6px;margin-bottom:12px}
.chip{flex:1;font-family:'IBM Plex Mono',monospace;font-size:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--ink-soft);border-radius:16px;padding:7px 0;cursor:pointer;transition:.15s}
.chip.on{background:var(--maroon,#6B1F2E);color:#FFE9B0;border-color:#6B1F2E}
.wchip.on{background:rgba(143,168,136,.24);border-color:rgba(143,168,136,.6);color:var(--cream)}
.chip:active{transform:scale(.95)}
.items{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:9px 2px 7px;text-align:center;cursor:pointer;transition:.15s;color:var(--ink-soft);position:relative}
.item.sel{background:rgba(232,145,107,.2);border-color:rgba(232,145,107,.6);color:var(--cream)}
.item.locked{opacity:.4;cursor:not-allowed}
.item .e{font-size:18px;display:block}.item .n{font-size:8.5px;margin-top:3px}
.item .lock{position:absolute;top:3px;right:5px;font-size:8px}
.hint{font-size:10.5px;color:var(--ink-soft);text-align:center;margin:10px 2px 4px;line-height:1.5}
.luckcard{background:linear-gradient(180deg,rgba(255,247,229,.08),rgba(232,145,107,.06));border:1px solid rgba(232,145,107,.25);border-radius:14px;padding:14px;text-align:center;margin-bottom:10px}
.luckcard .big{font-size:30px}.luckcard .msg{font-size:13px;color:var(--cream);margin-top:8px;line-height:1.6}
.luckcard .sm{font-size:9px;color:var(--ink-soft);margin-top:8px;font-family:'IBM Plex Mono',monospace}
.collected{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.collected .c{font-size:18px;background:rgba(255,255,255,.05);border-radius:9px;padding:5px 7px}
/* 오늘의 창 — 하루 팔찌(구슬 실) */
.thread{position:relative;height:34px;margin:4px 2px 6px}
.thread .string{position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(255,255,255,.18);border-radius:2px}
.thread .row2{position:absolute;inset:0;display:flex;align-items:center;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.thread .row2::-webkit-scrollbar{display:none}
.tbead{width:18px;height:18px;border-radius:50%;flex:none;box-shadow:inset -2px -2px 4px rgba(0,0,0,.22),inset 2px 2px 4px rgba(255,255,255,.5);animation:pop .42s cubic-bezier(.2,1.4,.5,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.winrow{display:flex;align-items:center;justify-content:space-between;font-size:9px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.combo{color:#E8B04E;opacity:0;transition:opacity .35s}.combo.show{opacity:1}
.demo{display:flex;gap:6px;margin-top:6px}
.demo button{flex:1;font-size:10px;font-family:'IBM Plex Mono',monospace;background:transparent;border:1px dashed rgba(255,255,255,.2);color:var(--ink-soft);border-radius:12px;padding:7px 0;cursor:pointer}
.demo button:active{background:rgba(255,255,255,.05)}
.linkbtn{width:100%;font-family:'Gowun Batang',serif;font-size:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--cream);border-radius:13px;padding:10px;cursor:pointer;margin-top:4px}
.linkbtn:active{transform:scale(.98)}
.note{font-size:10px;color:var(--ink-soft);line-height:1.6;margin-top:8px}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span id="clock">9:41</span><span class="dot"><i></i><i></i><i></i></span></div>
  <div class="appbar">
    <div><div class="brand" id="mood">에너지와 활력</div><h1 id="title">코이켄호프</h1></div>
    <div class="stat" id="stat">연속 <b id="streak">1</b>일<br>복 <b id="luckN">0</b></div>
  </div>

  <div class="win-wrap">
    <div class="win">
      <video id="baseVideo" loop muted playsinline></video>
      <img class="base" id="baseImg" alt="">
      <canvas id="cv" width="720" height="1120"></canvas>
    </div>
    <div class="frame"><div class="glass"></div><div class="gleam"></div><div class="outer"></div><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div><div class="sill"></div>
      <div class="cup"><span class="steam s1"></span><span class="steam s2"></span><span class="steam s3"></span><span class="saucer"></span><span class="handle"></span><span class="body"></span></div>
    </div>
    <div class="pot"><div class="l"></div><div class="b"></div></div>
    <div class="toast" id="toast"><span id="toastText"></span></div>
    <div class="cap" id="cap"><span id="capText"></span></div>
  </div>

  <div class="rich"><div class="bar"><i id="richBar"></i></div><div class="lv" id="richLv">새싹</div></div>

  <div class="gardens" id="gardens"></div>

  <div class="tabs">
    <button class="tab on" data-s="env">시간·날씨</button>
    <button class="tab" data-s="deco">꾸미기</button>
    <button class="tab" data-s="luck">오늘의 창</button>
    <button class="tab" data-s="real">실사</button>
  </div>

  <div class="panel">
    <div class="sect on" id="sect-env">
      <div class="sub">시간</div>
      <div class="row" id="timebar"></div>
      <div class="sub">날씨</div>
      <div class="row" id="weather"></div>
      <div class="hint" id="growHint">정원을 자주 들여다볼수록 더 풍성해져요.</div>
      <div class="demo">
        <button id="demoVisit">데모 · 며칠 방문한 척</button>
        <button id="demoAway">데모 · 오래 비운 척</button>
      </div>
    </div>

    <div class="sect" id="sect-deco">
      <div class="sub">정원에 놓기 · 탭해서 배치</div>
      <div class="items" id="items"></div>
      <div class="hint" id="decoHint">아이템을 고르고 창을 탭하면 그 자리에 놓여요. 놓인 걸 탭하면 치워져요.</div>
    </div>

    <div class="sect" id="sect-luck">
      <div id="luckArea"></div>
    </div>

    <div class="sect" id="sect-real">
      <div class="sub">하이브리드 · 실사 배경 연결</div>
      <button class="linkbtn" id="pickBase">📷 사진·영상 불러와 이 창에 깔기</button>
      <input type="file" id="baseFile" accept="image/*,video/*" hidden>
      <button class="linkbtn" id="clearBase" style="margin-top:6px">그림 정원으로 되돌리기</button>
      <div class="note">실사 사진/영상을 베이스로 깔고, 그 위에 시간·날씨·꾸미기·기운을 그대로 얹습니다. 실제 앱에선 정원별 라이선스 영상을 연결해요. (여기선 기기의 파일로 바로 시연 가능)</div>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";
const cv=document.getElementById('cv');const screenCtx=cv.getContext('2d');let ctx=screenCtx;
const W=cv.width,H=cv.height;
const cacheCv=(typeof OffscreenCanvas!=='undefined')?new OffscreenCanvas(W,H):(function(){const c=document.createElement('canvas');c.width=W;c.height=H;return c;})();
const cacheCtx=cacheCv.getContext('2d');
let baseDirty=true;
const DAY=24*3600*1000;

/* ---------- gardens meta ---------- */
const GARDENS=[
  {key:'keukenhof',i:'🌷',t:'꽃정원',title:'꽃 정원',mood:'에너지와 활력',cap:'무지개 튤립밭과 나비. 알록달록한 꽃밭이 마음에 생기를 불어넣어요.',def:'day',el:'wood'},
  {key:'shinjuku',i:'🏯',t:'지브리성',title:'벚꽃 향기는 날리고..',mood:'설렘과 환상',cap:'층층이 쌓인 온천장과 붉은 다리, 흩날리는 봄꽃. 동화 속으로 걸어 들어가요.',def:'day',el:'fire'},
  {key:'changdeokgung',i:'🌅',t:'월정교',title:'경주 월정교',mood:'노을의 평온',cap:'경주 월정교, 노을에 물든 신라의 다리. 고요한 물 위로 하루를 내려놓아요.',def:'evening',el:'metal'},
  {key:'provence',i:'🌆',t:'도시',title:'황혼의 도시',mood:'도시의 생기',cap:'황혼에 물든 마천루와 강. 도시의 불빛이 마음에 생기를 더해요.',def:'evening',el:'earth'},
  {key:'sea',i:'🌊',t:'여름바다',title:'여름 바다',mood:'시원함과 해방감',cap:'에메랄드빛 바다 위 다리. 탁 트인 여름, 마음까지 시원하게.',def:'day',el:'water'},
];
/* 오늘의 창 — 오행은 사용자에게 노출되지 않는 내부 디자인 엔진 (색·구슬·위로로만 표현) */
const ELMETA={
  wood: {bead:'#7CB66F', label:'초록빛', win:'꽃 정원'},
  fire: {bead:'#EF9F7E', label:'노을빛', win:'지브리성'},
  earth:{bead:'#D9B871', label:'흙빛',   win:'도시'},
  metal:{bead:'#C6CDD6', label:'달빛',   win:'월정교'},
  water:{bead:'#7FC1DE', label:'물빛',   win:'여름바다'},
};
/* 상생: 목→화→토→금→수→목 (사용자에겐 "두 빛이 이어졌어요"로만 노출) */
const SHENG={wood:'fire',fire:'earth',earth:'metal',metal:'water',water:'wood'};
const COMBO_NAME={wood:'새싹이 빛을 불렀어요',fire:'빛이 땅을 데웠어요',earth:'땅이 결정을 맺었어요',metal:'결정이 물을 머금었어요',water:'물이 새싹을 깨웠어요'};
/* 창이 건네는 한 줄 위로 — 오행별 (솜뭉치 보이스) */
const WIN_WORDS={
  wood:['새싹은 서두르지 않아. 오늘 한 뼘이면 충분해.','네 안에서 뭔가 조용히 자라고 있어.'],
  fire:['네 안의 불빛은 아직 환하게 켜져 있어.','오늘의 설렘, 꺼뜨리지 마.'],
  earth:['오늘도 네 자리를 지켰어. 그게 단단함이야.','단단한 땅처럼, 너는 거기 있어.'],
  metal:['고요한 밤이야. 이대로도 괜찮아.','잘 다듬어진 하루였어.'],
  water:['흘려보내도 돼. 물은 늘 길을 찾아.','오늘은 가볍게, 흐르는 대로.'],
};
const TODS=[['dawn','새벽'],['morning','아침'],['day','낮'],['evening','노을'],['night','밤']];
const WEATHERS=[['clear','☀️'],['cloudy','☁️'],['rain','🌧️'],['snow','❄️']];
const ITEMS=[
  {id:'bench',e:'🪑',n:'벤치',unlock:0},
  {id:'lantern',e:'🏮',n:'석등',unlock:0},
  {id:'birdhouse',e:'🐦',n:'새집',unlock:20},
  {id:'pot',e:'🪴',n:'화분',unlock:20},
  {id:'stones',e:'🪨',n:'디딤돌',unlock:40},
  {id:'swing',e:'🌳',n:'그네',unlock:55},
  {id:'fountain',e:'⛲',n:'분수',unlock:70},
  {id:'arch',e:'🌹',n:'장미문',unlock:85},

/* ===== visit / growth / pause logic ===== */
function todayIdx(){return Math.floor(Date.now()/DAY);}
function onArrive(){
  const now=Date.now(), gap=now-S.lastVisit;

  if(gap>4*3600*1000 && gap<2*DAY){ S.streak++; grow(garden,4); toast('오늘도 와줬네요 +생기'); }
  else if(gap>=2*DAY){ S.streak=1; } // streak reset but nothing lost
  // daily luck availability
  refreshLuckBadges();
  S.lastVisit=now; save(); refreshStat();
}
function isPaused(){ // pet-like: long absence = garden paused & waiting
  return (Date.now()-S.lastVisit) > 2.2*DAY;
}

  const r=S.g[gk].rich;ITEMS.forEach(it=>{if(it.unlock>0 && r>=it.unlock && r-4<it.unlock){toast('새 아이템 해금: '+it.n);}});

  else if(it.type==='stones'){ctx.fillStyle='#9a8a76';for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(x-14*s+i*14*s,y-((i%2)*3),9*s,5*s,0,0,7);ctx.fill();}}
  else if(it.type==='swing'){ctx.strokeStyle='#6e4e30';ctx.lineWidth=4*s;ctx.beginPath();ctx.moveTo(x-22*s,y-44*s);ctx.lineTo(x,y-58*s);ctx.lineTo(x+22*s,y-44*s);ctx.stroke();ctx.lineWidth=1.5*s;ctx.beginPath();ctx.moveTo(x-8*s,y-50*s);ctx.lineTo(x-8*s,y-18*s);ctx.moveTo(x+8*s,y-50*s);ctx.lineTo(x+8*s,y-18*s);ctx.stroke();ctx.fillStyle='#8a5e38';ctx.fillRect(x-11*s,y-18*s,22*s,4*s);ctx.fillStyle='#5f8043';ctx.beginPath();ctx.arc(x,y-60*s,10*s,0,7);ctx.fill();}
  else if(it.type==='fountain'){ctx.fillStyle='#9aa0a4';ctx.beginPath();ctx.ellipse(x,y,20*s,7*s,0,0,7);ctx.fill();ctx.fillStyle='#5aa0b0';ctx.beginPath();ctx.ellipse(x,y-1*s,15*s,4*s,0,0,7);ctx.fill();ctx.fillStyle='#9aa0a4';ctx.fillRect(x-3*s,y-18*s,6*s,16*s);ctx.fillStyle='rgba(180,220,230,0.7)';ctx.beginPath();ctx.ellipse(x,y-18*s,5*s,3*s,0,0,7);ctx.fill();}
  else if(it.type==='arch'){ctx.strokeStyle='#6e8a4e';ctx.lineWidth=4*s;ctx.beginPath();ctx.moveTo(x-18*s,y);ctx.lineTo(x-18*s,y-34*s);ctx.quadraticCurveTo(x,y-54*s,x+18*s,y-34*s);ctx.lineTo(x+18*s,y);ctx.stroke();ctx.fillStyle='#d94f6a';for(let i=0;i<8;i++){const a=Math.PI*(0.1+i*0.1);ctx.beginPath();ctx.arc(x+Math.cos(a)*18*s,y-34*s-Math.sin(a)*20*s,3.5*s,0,7);ctx.fill();}}
}

/* ================= weather/particle layers ================= */
function ensureWeather(){clouds.length=0;const base=(weather==='cloudy'||weather==='rain'||weather==='snow')?5:(garden==='provence'||garden==='keukenhof'||garden==='sea'?2:1);
  while(clouds.length<base)clouds.push({x:Math.random()*W,y:30+Math.random()*110,s:40+Math.random()*38,v:0.12+Math.random()*0.2});
  rain.length=0;if(weather==='rain')while(rain.length<140)rain.push({x:Math.random()*W,y:Math.random()*H,l:9+Math.random()*12,v:8+Math.random()*5});
  snow.length=0;if(weather==='snow')while(snow.length<100)snow.push({x:Math.random()*W,y:Math.random()*H,r:1.6+Math.random()*2.4,v:1+Math.random()*1.3,d:Math.random()*7});
  petals.length=0;if(garden==='shinjuku')while(petals.length<34)petals.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.6,vy:0.5+Math.random()*0.5,r:Math.random()*7});
  // plum blossoms (매화) that fall from above the keep — concentrated over the castle, drifting down naturally
  plum.length=0;
  if(garden==='shinjuku'){const cxk=W*0.69+78; // keep centre
    while(plum.length<28)plum.push({
      x:cxk+(Math.random()-0.5)*210,        // spawn spread around the keep
      y:Math.random()*H*0.55 - H*0.16,      // mostly above the keep, drifting down through it
      vx:(Math.random()-0.5)*0.5,           // gentle sideways drift
      vy:0.5+Math.random()*0.55,            // slow fall
      r:Math.random()*7,                    // rotation phase
      sw:0.7+Math.random()*0.9,             // sway amount
      sz:4.4+Math.random()*2.6,             // petal size (a touch larger, clearer)
      tone:Math.random()                    // pink shade
    });}
  fireflies.length=0;birds.length=0;}
function drawPlumBlossoms(time){ // five-petal plum flowers drifting down over the keep
  const dk=isDark();const cxk=W*0.69+78;
  plum.forEach(p=>{
    p.x+=p.vx+Math.sin(time*0.8+p.r)*p.sw;   // sway side to side
    p.y+=p.vy;
    p.r+=0.018;
    if(p.y>H+8){p.y=-8;p.x=cxk+(Math.random()-0.5)*240;} // respawn above the keep
    // colour: plum pinks (a touch deeper/pinker than cherry)
    const pinks=dk?['#b07a96','#9a6a86','#c08aa4']:['#f6b9d2','#ef9ec0','#f7cfe0','#e98ab2'];
    const c=pinks[(p.tone*pinks.length)|0];
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
    // 5 rounded petals
    ctx.fillStyle=c;
    for(let k=0;k<5;k++){const a=k/5*Math.PI*2;ctx.beginPath();
      ctx.ellipse(Math.cos(a)*p.sz*0.62,Math.sin(a)*p.sz*0.62,p.sz*0.52,p.sz*0.42,a,0,7);ctx.fill();}
    // tiny golden centre
    ctx.fillStyle=dk?'#caa14a':'#f0c24a';ctx.beginPath();ctx.arc(0,0,p.sz*0.26,0,7);ctx.fill();
    ctx.restore();
  });
}
function drawSailboat(time){ // cruising sloop modeled on the reference photo — big mainsail + genoa, sleek white hull
  const dk=isDark();const hz=H*0.62;const s=0.82;
  const span=W+320;const speed=10;
  const x0=-150+((time*speed)%span);                 // hull center drifts left->right
  const wl=hz+(H-hz)*0.40 + Math.sin(time*0.6)*2;     // waterline (gentle bob)
  const sail=dk?'#e4eaef':'#fbfdfe', sailSh=dk?'#bcc6cf':'#e6ecf0';
  const hull=dk?'#e6ebf0':'#ffffff', hullSh=dk?'#9aa6b0':'#d2dce2', deck=dk?'#c2ccd4':'#e8eef2';
  const mast=dk?'#aeb6bd':'#cdd3d8', rig='rgba(80,92,102,0.55)';

  ctx.beginPath();ctx.moveTo(mastX,mastTop);ctx.lineTo(bow-6*s,deckY-2*s);ctx.stroke();     // forestay
  // ---- mast ----
  ctx.strokeStyle=mast;ctx.lineWidth=3*s;ctx.beginPath();ctx.moveTo(mastX,deckY);ctx.lineTo(mastX,mastTop);ctx.stroke();
  ctx.fillStyle=mast;ctx.beginPath();ctx.arc(mastX,mastTop-1*s,1.6*s,0,7);ctx.fill();        // masthead
  // ---- genoa (large headsail, fore of mast, billowing) ----
  ctx.fillStyle=sail;ctx.beginPath();
  ctx.moveTo(mastX,mastTop-2*s);
  ctx.quadraticCurveTo(bow-30*s,wl-86*s,bow-6*s,deckY-2*s);   // leech curving to bow fitting
  ctx.quadraticCurveTo(mastX+34*s,wl-70*s,mastX,mastTop-2*s); // luff back up the forestay
  ctx.closePath();ctx.fill();
  ctx.fillStyle=sailSh;ctx.beginPath();                       // shaded inner panel
  ctx.moveTo(mastX,mastTop-2*s);ctx.quadraticCurveTo(mastX+30*s,wl-78*s,mastX+8*s,deckY-2*s);
  ctx.lineTo(mastX,deckY-2*s);ctx.closePath();ctx.fill();
  // ---- mainsail (aft of mast, big triangular, full curve on the leech) ----
  ctx.fillStyle=sail;ctx.beginPath();
  ctx.moveTo(mastX-1*s,mastTop-2*s);
  ctx.lineTo(mastX-1*s,deckY-6*s);                            // luff down the mast
  ctx.lineTo(stern+30*s,deckY-10*s);                          // foot along the boom
  ctx.quadraticCurveTo(stern+8*s,wl-92*s,mastX-1*s,mastTop-2*s); // curved leech back to head
  ctx.closePath();ctx.fill();
  ctx.fillStyle=sailSh;ctx.beginPath();                       // luff-side shading
  ctx.moveTo(mastX-1*s,mastTop-2*s);ctx.lineTo(mastX-1*s,deckY-6*s);ctx.lineTo(mastX-22*s,deckY-8*s);
  ctx.quadraticCurveTo(mastX-14*s,wl-86*s,mastX-1*s,mastTop-2*s);ctx.closePath();ctx.fill();
  // seam battens on mainsail
  ctx.strokeStyle='rgba(150,162,172,0.35)';ctx.lineWidth=0.8;
  for(let k=1;k<=3;k++){const t=k/4;ctx.beginPath();ctx.moveTo(mastX-1*s,mastTop-2*s+(deckY-6*s-(mastTop-2*s))*t);ctx.lineTo(stern+24*s+(8*s)*t,wl-70*s+ (40*s)*t);ctx.stroke();}
  // ---- boom ----
  ctx.strokeStyle=mast;ctx.lineWidth=2.6*s;ctx.beginPath();ctx.moveTo(mastX,deckY-8*s);ctx.lineTo(stern+28*s,deckY-10*s);ctx.stroke();
  // ---- hull (sleek, low freeboard, raked bow) ----
  ctx.fillStyle=hull;ctx.beginPath();
  ctx.moveTo(stern,deckY+2*s);
  ctx.quadraticCurveTo(stern-6*s,wl+4*s,stern+12*s,wl+8*s);   // stern quarter
  ctx.lineTo(bow-22*s,wl+8*s);
  ctx.quadraticCurveTo(bow+6*s,wl+6*s,bow,deckY);             // bow rises to a fine point
  ctx.lineTo(stern,deckY+2*s);ctx.closePath();ctx.fill();
  // waterline shadow + boot stripe
  ctx.fillStyle=hullSh;ctx.beginPath();
  ctx.moveTo(stern+12*s,wl+8*s);ctx.lineTo(bow-22*s,wl+8*s);ctx.quadraticCurveTo(bow,wl+6*s,bow-8*s,wl+11*s);
  ctx.lineTo(stern+12*s,wl+11*s);ctx.closePath();ctx.fill();
  // cabin coachroof + cockpit
  ctx.fillStyle=deck;ctx.beginPath();ctx.moveTo(x0-30*s,deckY);ctx.lineTo(x0+34*s,deckY);ctx.lineTo(x0+30*s,deckY-7*s);ctx.lineTo(x0-26*s,deckY-7*s);ctx.closePath();ctx.fill();
  ctx.fillStyle='#33424c';for(let i=0;i<4;i++){ctx.fillRect(x0-22*s+i*13*s,deckY-5*s,8*s,3*s);} // cabin windows
  ctx.fillStyle=dk?'#2a3640':'#54636e';ctx.fillRect(x0+36*s,deckY-5*s,12*s,5*s);              // cockpit/bimini hint
  // ---- bow wave + wake (boat moving right) ----
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.6;
  ctx.beginPath();ctx.moveTo(bow-6*s,wl+8*s);ctx.quadraticCurveTo(bow+14*s,wl+10*s,bow+30*s,wl+13*s);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.moveTo(stern+10*s,wl+9*s);ctx.lineTo(stern-46*s,wl+13*s);ctx.stroke();
  // ---- mirror-calm reflection ----
  ctx.save();ctx.globalAlpha=dk?0.18:0.28;ctx.translate(0,2*(wl+8*s));ctx.scale(1,-1);
  ctx.fillStyle=sail;
  ctx.beginPath();ctx.moveTo(mastX-1*s,mastTop-2*s);ctx.lineTo(mastX-1*s,deckY-6*s);ctx.lineTo(stern+30*s,deckY-10*s);ctx.quadraticCurveTo(stern+8*s,wl-92*s,mastX-1*s,mastTop-2*s);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(mastX,mastTop-2*s);ctx.quadraticCurveTo(bow-30*s,wl-86*s,bow-6*s,deckY-2*s);ctx.quadraticCurveTo(mastX+34*s,wl-70*s,mastX,mastTop-2*s);ctx.closePath();ctx.fill();
  ctx.fillStyle=hull;ctx.beginPath();ctx.moveTo(stern,deckY+2*s);ctx.lineTo(bow,deckY);ctx.lineTo(bow-22*s,wl+8*s);ctx.lineTo(stern+12*s,wl+8*s);ctx.closePath();ctx.fill();
  ctx.restore();
  // reflection ripple streaks
  ctx.strokeStyle=dk?'rgba(180,200,210,0.12)':'rgba(255,255,255,0.22)';ctx.lineWidth=1;
  for(let i=0;i<5;i++){const yy=wl+16*s+i*7*s;ctx.beginPath();ctx.moveTo(x0-40*s,yy);ctx.lineTo(x0+50*s,yy);ctx.stroke();}
}
function drawShoreWaves(time){ // surf rolling in and out at the beach — chalang-chalang
  const dk=isDark();const beachY=H*0.70;
  // base waterline curve (matches the cached sand edge)
  function edge(x){return beachY+10+Math.sin(x*0.018+1.2)*9;}
  // wash cycle: 0..1 in, then back out (sinusoidal), ~4.5s period
  const cyc=(Math.sin(time*1.4)*0.5+0.5);          // 0 (far out) .. 1 (rushed up the sand)
  const reach=cyc*46;                               // how far the thin water sheet climbs the sand
  // 1) thin translucent water sheet sliding up the sand
  ctx.save();ctx.beginPath();ctx.moveTo(0,edge(0)+reach);
  for(let x=0;x<=W;x+=10){const ripple=Math.sin(x*0.05-time*2.2)*3*cyc;ctx.lineTo(x,edge(x)+reach+ripple);}
  ctx.lineTo(W,edge(W)-6);for(let x=W;x>=0;x-=10)ctx.lineTo(x,edge(x)-6);ctx.closePath();
  const wsh=ctx.createLinearGradient(0,beachY,0,beachY+reach+14);
  if(dk){wsh.addColorStop(0,'rgba(70,110,120,0.5)');wsh.addColorStop(1,'rgba(70,110,120,0.05)');}
  else{wsh.addColorStop(0,'rgba(120,210,206,0.55)');wsh.addColorStop(1,'rgba(160,232,224,0.08)');}
  ctx.fillStyle=wsh;ctx.fill();ctx.restore();
  // 2) leading foam line at the top of the wash (bright, lacey, wobbling)
  ctx.lineCap='round';
  [[0,dk?'rgba(210,224,230,0.7)':'rgba(255,255,255,0.95)',3.0],
   [6,dk?'rgba(210,224,230,0.4)':'rgba(255,255,255,0.55)',1.8]].forEach(f=>{
    ctx.strokeStyle=f[1];ctx.lineWidth=f[2];ctx.beginPath();
    for(let x=0;x<=W;x+=6){const ripple=Math.sin(x*0.05-time*2.2)*3*cyc+Math.sin(x*0.13+time*1.1)*1.4;
      const yy=edge(x)+reach+f[0]+ripple;if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy);}
    ctx.stroke();});
  // 3) foam bubbles riding the leading edge
  ctx.fillStyle=dk?'rgba(210,224,230,0.45)':'rgba(255,255,255,0.8)';
  for(let i=0;i<40;i++){const x=(i*149+ (time*30))%W;const ripple=Math.sin(x*0.05-time*2.2)*3*cyc;
    const yy=edge(x)+reach+ripple+Math.sin(i*2.1)*2;ctx.beginPath();ctx.arc(x,yy,1+ (i%3)*0.7,0,7);ctx.fill();}
  // 4) faint receding back-wash line lower down (previous wave draining)
  const cyc2=(Math.sin(time*1.4-1.0)*0.5+0.5);const reach2=cyc2*46;
  ctx.strokeStyle=dk?'rgba(200,214,222,0.25)':'rgba(255,255,255,0.35)';ctx.lineWidth=1.4;ctx.beginPath();
  for(let x=0;x<=W;x+=8){const yy=edge(x)+reach2+12+Math.sin(x*0.05-time*2.0)*2.4;if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy);}
  ctx.stroke();
}
function drawWindmill(time){ // slowly spinning sails over the cached windmill body
  const dk=isDark();const hz=H*0.42;const mx=W*0.2,my=hz-6;const hx=mx,hy=my-86;
  ctx.save();ctx.translate(hx,hy);ctx.rotate(0.5+time*0.35); // slow, steady turn
  ctx.strokeStyle='#3e2a1a';ctx.fillStyle=dk?'rgba(220,216,200,0.8)':'rgba(245,240,225,0.88)';ctx.lineWidth=3;
  for(let i=0;i<4;i++){ctx.save();ctx.rotate(i*Math.PI/2);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-88);ctx.stroke();
    ctx.fillRect(4,-86,15,76);ctx.strokeRect(4,-86,15,76);
    ctx.beginPath();for(let j=-82;j<-10;j+=12){ctx.moveTo(4,j);ctx.lineTo(19,j);}ctx.stroke();
    ctx.restore();}
  ctx.beginPath();ctx.arc(0,0,5,0,7);ctx.fillStyle='#3e2a1a';ctx.fill();
  ctx.restore();
}
function drawButterflies(time){ // 4 butterflies (2 pairs) fluttering daintily over the flower beds
  const cols=['#E8916B','#b5a0d4','#f4d24a','#ef96b8'];
  // [baseX, baseY, phase, speed] — spread across the field in two loose pairs
  const defs=[[0.26,0.58,0.5,1.0],[0.40,0.64,1.7,1.15],[0.60,0.60,3.0,0.92],[0.76,0.66,4.4,1.08]];
  defs.forEach((d,i)=>{
    // wandering, looping flight path — figure-eight-ish drift = nappul-nappul
    const bx=d[0]*W + Math.sin(time*0.55*d[3]+d[2])*56 + Math.cos(time*0.32+i)*22;
    const by=d[1]*H + Math.sin(time*1.25+d[2])*30 + Math.cos(time*0.7+d[2])*12;
    // banking: butterfly tilts as it turns
    const bank=Math.sin(time*0.55*d[3]+d[2])*0.5;
    const flap=Math.sin(time*7.5+d[2]);          // smooth flap cycle
    const open=0.35+Math.abs(flap)*0.65;          // wings open/close
    ctx.save();ctx.translate(bx,by);ctx.rotate(bank*0.5);
    const col=cols[i%cols.length];
    // wing shading
    const up=col, low=col;
    // left wings (upper + lower)
    [[-1],[1]].forEach(s=>{const dir=s[0];
      ctx.fillStyle=up;
      // upper wing
      ctx.beginPath();ctx.ellipse(dir*4.5*open, -2.5, 5.2*open, 4.2, dir*0.5, 0, 7);ctx.fill();
      // lower wing
      ctx.fillStyle=low;
      ctx.beginPath();ctx.ellipse(dir*3.6*open, 3.2, 3.6*open, 3.2, dir*0.35, 0, 7);ctx.fill();
      // tiny highlight
      ctx.fillStyle='rgba(255,255,255,0.30)';
      ctx.beginPath();ctx.ellipse(dir*4.2*open, -3, 1.8*open, 1.4, dir*0.5, 0, 7);ctx.fill();
    });
    // body + antennae
    ctx.fillStyle='rgba(55,38,28,0.85)';ctx.beginPath();ctx.ellipse(0,0.5,1.2,5,0,0,7);ctx.fill();
    ctx.strokeStyle='rgba(55,38,28,0.7)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(0,-4);ctx.quadraticCurveTo(-2,-7,-3.2,-7.5);ctx.moveTo(0,-4);ctx.quadraticCurveTo(2,-7,3.2,-7.5);ctx.stroke();
    ctx.restore();
  });
}
function drawGulls(time){ // 3 seagulls gliding above the floating islet (~W*0.62, H*0.58)
  const dk=isDark();ctx.strokeStyle=dk?'rgba(220,225,235,0.78)':'rgba(60,66,80,0.72)';ctx.lineWidth=2.2;
  const gulls=[[0.52,0.40,15,0.5],[0.64,0.34,12,1.4],[0.74,0.43,13,2.4]];
  gulls.forEach((g,i)=>{const baseX=g[0]*W, baseY=g[1]*H;
    const x=baseX+Math.sin(time*0.4+g[3])*34;
    const y=baseY+Math.sin(time*0.7+g[3])*7;
    const flap=Math.sin(time*4.5+g[3]);const w=g[2]*(0.6+0.4*Math.abs(flap));
    ctx.beginPath();ctx.moveTo(x-w,y+(flap>0?-2:2));ctx.quadraticCurveTo(x-w*0.4,y-w*0.5,x,y);ctx.quadraticCurveTo(x+w*0.4,y-w*0.5,x+w,y+(flap>0?-2:2));ctx.stroke();});
}
function drawClouds(){clouds.forEach(c=>{c.x+=c.v;if(c.x-c.s*2>W)c.x=-c.s*2;
  let col;
  if(isDark())col='rgba(60,66,90,0.85)';
  else if(weather==='rain')col='rgba(150,155,165,0.9)';
  else if(tod==='evening')col='rgba(232,150,120,0.55)';
  else if(tod==='dawn')col='rgba(238,180,160,0.55)';
  else col='rgba(255,255,255,0.9)';
  puff(c.x,c.y,c.s,col);});}
function drawRain(){ctx.strokeStyle='rgba(180,200,220,0.5)';ctx.lineWidth=1.4;rain.forEach(r=>{r.y+=r.v;r.x-=2;if(r.y>H){r.y=-10;r.x=Math.random()*W;}ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-2,r.y+r.l);ctx.stroke();});}
function drawSnow(time){ctx.fillStyle='rgba(255,255,255,0.92)';snow.forEach(s=>{s.y+=s.v;s.x+=Math.sin(time+s.d)*0.6;if(s.y>H){s.y=-6;s.x=Math.random()*W;}ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();});}
function drawPetals(time){ctx.fillStyle=isDark()?'rgba(200,160,185,0.7)':'rgba(249,185,210,0.85)';petals.forEach(p=>{p.x+=p.vx+Math.sin(time+p.r)*0.3;p.y+=p.vy;p.r+=0.04;if(p.y>H){p.y=-6;p.x=Math.random()*W;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.beginPath();ctx.ellipse(0,0,3,5,0,0,7);ctx.fill();ctx.restore();});}
/* richness drives extra life */
function hexA(h,a){var n=parseInt(h.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function riverPts(){return [[0.21,0.41,3],[0.29,0.50,5],[0.38,0.58,9],[0.34,0.67,13],[0.49,0.74,20],[0.64,0.80,28],[0.74,0.87,36],[0.62,0.99,46]].map(function(p){return {x:p[0]*W,y:p[1]*H,w:p[2]};});}
function _perp(P,i){var a=P[Math.max(0,i-1)],b=P[Math.min(P.length-1,i+1)];var dx=b.x-a.x,dy=b.y-a.y,L=Math.hypot(dx,dy)||1;return {nx:-dy/L,ny:dx/L};}
function riverEdges(){var P=riverPts(),Lt=[],Rt=[];for(var i=0;i<P.length;i++){var pp=_perp(P,i);Lt.push({x:P[i].x+pp.nx*P[i].w,y:P[i].y+pp.ny*P[i].w});Rt.push({x:P[i].x-pp.nx*P[i].w,y:P[i].y-pp.ny*P[i].w});}return {P:P,L:Lt,R:Rt};}
function _smooth(pts){ctx.moveTo(pts[0].x,pts[0].y);for(var i=0;i<pts.length-1;i++){var mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);}ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);}
function riverPath(){var E=riverEdges(),L=E.L,R=E.R;ctx.beginPath();
  ctx.moveTo(L[0].x,L[0].y);for(var i=0;i<L.length-1;i++){var mx=(L[i].x+L[i+1].x)/2,my=(L[i].y+L[i+1].y)/2;ctx.quadraticCurveTo(L[i].x,L[i].y,mx,my);}ctx.lineTo(L[L.length-1].x,L[L.length-1].y);
  ctx.lineTo(R[R.length-1].x,R[R.length-1].y);
  for(var j=R.length-1;j>0;j--){var nx=(R[j].x+R[j-1].x)/2,ny=(R[j].y+R[j-1].y)/2;ctx.quadraticCurveTo(R[j].x,R[j].y,nx,ny);}ctx.lineTo(R[0].x,R[0].y);ctx.closePath();}
function lerpRiver(u){var P=riverPts(),n=P.length-1,f=Math.max(0,Math.min(0.9999,u))*n,i=Math.floor(f),tt=f-i;return {x:P[i].x+(P[i+1].x-P[i].x)*tt,y:P[i].y+(P[i+1].y-P[i].y)*tt,w:P[i].w+(P[i+1].w-P[i].w)*tt};}
function drawRiverCached(dk){
  riverPath();
  var wg=ctx.createLinearGradient(0,H*0.40,0,H);
  if(dk){wg.addColorStop(0,'#16323f');wg.addColorStop(1,'#1f4f63');}else{wg.addColorStop(0,'#69b6cc');wg.addColorStop(0.55,'#62c2da');wg.addColorStop(1,'#7ad2e2');}
  ctx.fillStyle=wg;ctx.fill();
  var E=riverEdges();ctx.lineWidth=2.4;ctx.strokeStyle=dk?'rgba(40,64,52,0.55)':'rgba(96,134,82,0.6)';
  ctx.beginPath();_smooth(E.L);ctx.stroke();ctx.beginPath();_smooth(E.R);ctx.stroke();
}
function drawRiverFlow(time){
  var el=todayElOf(),tint=ELMETA[el].bead;
  var spd=({water:0.11,wood:0.05,fire:0.08,earth:0.035,metal:0.065})[el]||0.06;
  ctx.save();riverPath();ctx.clip();
  for(var i=0;i<11;i++){var u=((i/11)+time*spd)%1,p=lerpRiver(u),gw=Math.max(2.2,p.w*0.55);
    ctx.fillStyle=hexA(tint,0.82);ctx.beginPath();ctx.ellipse(p.x,p.y,gw,Math.max(0.9,p.w*0.18),0,0,7);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.ellipse(p.x-gw*0.25,p.y-0.5,gw*0.4,0.7,0,0,7);ctx.fill();}
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineCap='round';ctx.lineWidth=1.2;
  for(var k=0;k<3;k++){ctx.beginPath();for(var u2=0;u2<=1.0001;u2+=0.035){var q=lerpRiver(u2),q2=lerpRiver(Math.min(1,u2+0.01)),dx=q2.x-q.x,dy=q2.y-q.y,L=Math.hypot(dx,dy)||1,off=Math.sin(u2*20+time*2.2+k*2.1)*Math.min(4,q.w*0.32),px=q.x+(-dy/L)*off,py=q.y+(dx/L)*off;if(u2===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();}
  ctx.restore();
}
function drawLife(time){const r=S.g[garden].rich/100;if(paused)return;
  const floral=(garden==='keukenhof'); // bonus petals/butterflies only over the tulip field
  // bonus blossoms in ground band
  if(floral){const top=H*0.55;ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<Math.round(r*40);i++){const x=(i*131+time*4)%W;const y=top+((i*53)%(H-top));ctx.beginPath();ctx.arc(x,y,1.5+Math.random()*1.5,0,7);ctx.fill();}
  if(r>0.25){['#e88ca0','#f4d24a','#b5a0d4'].forEach((c,k)=>{ctx.fillStyle=c;for(let i=0;i<Math.round(r*10);i++){const x=(i*97+k*40)%W;const y=top+((i*71+k*30)%(H-top));ctx.beginPath();ctx.arc(x,y,2.5,0,7);ctx.fill();}});}
  // butterflies (more when rich) — flower garden keeps exactly its 4 dedicated butterflies
  const nb=(garden==='keukenhof')?0:Math.round(r*5);ctx.fillStyle='#E8916B';
  for(let i=0;i<nb;i++){const bx=(W*0.2+i*90+Math.sin(time*0.8+i)*40)%W;const by=H*0.4+Math.sin(time*1.2+i*2)*30+i*14;const f=Math.abs(Math.sin(time*12+i));
    ctx.fillStyle=['#E8916B','#f4d24a','#b5a0d4'][i%3];ctx.beginPath();ctx.ellipse(bx-3,by,4,3+f*3,-0.5,0,7);ctx.fill();ctx.beginPath();ctx.ellipse(bx+3,by,4,3+f*3,0.5,0,7);ctx.fill();}}
  // fireflies at night/evening
  if((tod==='night'||tod==='evening')&&garden!=='keukenhof'&&garden!=='provence'&&garden!=='sea'){while(fireflies.length<Math.round(6+r*10))fireflies.push({x:Math.random()*W,y:H*0.5+Math.random()*H*0.4,p:Math.random()*7});
    fireflies.forEach(f=>{f.x+=Math.sin(time+f.p)*0.3;f.y+=Math.cos(time*1.2+f.p)*0.2;const gl=0.3+Math.abs(Math.sin(time*2+f.p))*0.7;ctx.fillStyle=`rgba(255,231,150,${gl})`;ctx.beginPath();ctx.arc(f.x,f.y,2.2,0,7);ctx.fill();ctx.fillStyle=`rgba(255,231,150,${gl*0.22})`;ctx.beginPath();ctx.arc(f.x,f.y,7,0,7);ctx.fill();});}
}

/* ================= luck (오늘의 기운) ================= */
function luckAvailable(){return S.luckDay!==todayIdx();}
let fallingBeads=[]; // 창을 두드릴 때 떨어지는 구슬 애니메이션
function drawLuck(time){
  // 오늘 아직 담을 빛이 있으면, 창 속에 그날 색의 빛 모트가 부드럽게 떠다님
  const el=todayElOf();const col=ELMETA[el].bead;const cc=hexToRgb(col);
  if(beadAvailable()){
    for(let i=0;i<3;i++){const x=W*(0.22+i*0.28)+Math.sin(time*0.6+i)*18;const y=H*0.32+Math.cos(time*0.5+i*2)*14;
      const pulse=0.45+Math.abs(Math.sin(time*1.4+i))*0.45;
      const g=ctx.createRadialGradient(x,y,1,x,y,20*pulse);g.addColorStop(0,`rgba(${cc},${0.8*pulse})`);g.addColorStop(1,`rgba(${cc},0)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,20,0,7);ctx.fill();
      ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,3.4,0,7);ctx.fill();}
  }
  // 떨어지는 구슬
  for(let i=fallingBeads.length-1;i>=0;i--){const b=fallingBeads[i];b.t+=0.025;const ey=b.t*b.t;const y=b.y0+(H-20-b.y0)*ey;
    ctx.globalAlpha=Math.max(0,1-b.t*0.4);ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,y,8,0,7);ctx.fill();ctx.globalAlpha=1;
    if(b.t>=1)fallingBeads.splice(i,1);}
}
function hexToRgb(h){h=h.replace('#','');return parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16);}
/* 각 창의 오행이 풍경 위에 은은한 물상 입자로 떠오름 (사용자에겐 그냥 분위기) */
let elemParts=[];
function ensureElemParts(){const el=todayElOf();if(elemParts._el===el)return;elemParts=[];elemParts._el=el;
  const n=el==='earth'?14:11;
  for(let i=0;i<n;i++)elemParts.push({x:Math.random(),y:Math.random(),p:Math.random()*7,sp:0.3+Math.random()*0.5,sz:0.6+Math.random()*0.8});}
function drawElemental(time){
  const el=todayElOf();const col=ELMETA[el].bead;const cc=hexToRgb(col);
  ensureElemParts();
  ctx.save();
  elemParts.forEach((q,i)=>{
    let x=q.x*W, y=q.y*H, a=0;
    if(el==='wood'){ // 잎이 부드럽게 떠오름
      y=(q.y*H - time*14*q.sp)%H; if(y<0)y+=H; x=q.x*W+Math.sin(time*0.6+q.p)*22; a=0.16;
      ctx.fillStyle=`rgba(${cc},${a})`;ctx.beginPath();ctx.ellipse(x,y,3*q.sz,5*q.sz,Math.sin(time+q.p),0,7);ctx.fill();
    } else if(el==='fire'){ // 불티가 위로
      y=(q.y*H - time*26*q.sp)%H; if(y<0)y+=H; x=q.x*W+Math.sin(time*1.2+q.p)*14; a=0.18*(0.5+Math.abs(Math.sin(time*2+q.p))*0.5);
      ctx.fillStyle=`rgba(${cc},${a})`;ctx.beginPath();ctx.arc(x,y,2*q.sz,0,7);ctx.fill();
    } else if(el==='earth'){ // 포자·흙먼지가 느리게 부유
      x=q.x*W+Math.sin(time*0.4+q.p)*30; y=q.y*H+Math.cos(time*0.3+q.p)*20; a=0.13;
      ctx.fillStyle=`rgba(${cc},${a})`;ctx.beginPath();ctx.arc(x,y,2.2*q.sz,0,7);ctx.fill();
    } else if(el==='metal'){ // 정제된 반짝임
      a=0.22*Math.abs(Math.sin(time*1.6+q.p)); x=q.x*W; y=q.y*H*0.7;
      ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(x,y,1.6*q.sz,0,7);ctx.fill();
    } else { // water — 물방울이 천천히 가라앉음
      y=(q.y*H + time*16*q.sp)%H; x=q.x*W+Math.sin(time*0.7+q.p)*16; a=0.15;
      ctx.fillStyle=`rgba(${cc},${a})`;ctx.beginPath();ctx.ellipse(x,y,2*q.sz,3*q.sz,0,0,7);ctx.fill();
    }
  });
  ctx.restore();
}

/* ================= base layer (hybrid photo/video) ================= */
function drawBase(){
  if(baseImg&&baseImg.complete&&baseImg.naturalWidth){coverDraw(baseImg);return true;}
  if(baseVideo&&baseVideo.readyState>=2){coverDraw(baseVideo);return true;}
  return false; // fall back to drawn garden
}
function coverDraw(src){const sw=src.naturalWidth||src.videoWidth,sh=src.naturalHeight||src.videoHeight;const sr=sw/sh,dr=W/H;let dw,dh,dx,dy;
  if(sr>dr){dh=H;dw=H*sr;dx=(W-dw)/2;dy=0;}else{dw=W;dh=W/sr;dx=0;dy=(H-dh)/2;}ctx.drawImage(src,dx,dy,dw,dh);}

/* ================= main loop (cached static base + animated layers) ================= */
function renderBase(){
  ctx=cacheCtx;                     // draw static scene into cache
  const usedReal=drawBase();
  if(!usedReal)DRAW[garden](0);
  S.g[garden].items.forEach(drawDeco);   // placed items are static
  todOverlay();                     // bake time-of-day tint
  vignette(isDark()?0.46:0.3);
  ctx=screenCtx;                    // back to screen
  baseDirty=false;
}
function frame(now){const time=(now-t0)/1000;
  if(baseVideo&&baseVideo.readyState>=2&&!baseVideo.paused)baseDirty=true; // video base needs per-frame refresh
  if(baseDirty)renderBase();
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(cacheCv,0,0);       // blit cached scene
  // animated layers on top
  if(clouds.length)drawClouds();
  drawLife(time);
  if(garden==='shinjuku'){drawRiverFlow(time);drawPetals(time);drawPlumBlossoms(time);}
  if(garden==='provence'&&!(baseImg||baseVideo))drawSailboat(time);
  if(garden==='sea'&&!(baseImg||baseVideo)){drawGulls(time);drawShoreWaves(time);}
  if(garden==='keukenhof'&&!(baseImg||baseVideo)){drawWindmill(time);drawButterflies(time);}
  if(rain.length)drawRain();
  if(snow.length)drawSnow(time);
  // pet-waiting fog (animated fade)
  paused=isPaused();
  fog += ((paused?1:0)-fog)*0.05;
  if(fog>0.01){ctx.fillStyle=`rgba(225,225,230,${fog*0.5})`;ctx.fillRect(0,0,W,H);ctx.fillStyle=`rgba(120,120,140,${fog*0.16})`;ctx.fillRect(0,0,W,H);}
  drawElemental(time);
  drawLuck(time);
  requestAnimationFrame(frame);
}
function todOverlay(){if(weather==='rain'){ctx.fillStyle='rgba(60,70,90,0.2)';ctx.fillRect(0,0,W,H);}else if(weather==='snow'){ctx.fillStyle='rgba(220,228,238,0.13)';ctx.fillRect(0,0,W,H);}
  if(tod==='dawn'){ctx.fillStyle='rgba(60,50,90,0.26)';ctx.fillRect(0,0,W,H);const g=ctx.createLinearGradient(0,0,0,H*0.5);g.addColorStop(0,'rgba(255,170,150,0.16)');g.addColorStop(1,'rgba(255,170,150,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  else if(tod==='morning'){ctx.fillStyle='rgba(255,238,200,0.07)';ctx.fillRect(0,0,W,H);}
  else if(tod==='evening'){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'rgba(255,120,70,0.2)');g.addColorStop(0.6,'rgba(255,150,90,0.1)');g.addColorStop(1,'rgba(120,60,80,0.16)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  else if(tod==='night'){ctx.fillStyle='rgba(18,22,55,0.5)';ctx.fillRect(0,0,W,H);}}
function vignette(s){const v=ctx.createRadialGradient(W/2,H*0.44,H*0.38,W/2,H*0.5,H*0.82);v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,`rgba(20,15,10,${s||0.3})`);ctx.fillStyle=v;ctx.fillRect(0,0,W,H);}

});

  document.getElementById('shareWall').onclick=shareWindow;
}
/* 창을 두드리면 그날 창(오행)의 구슬이 떨어진다 */
function collectBead(fromBtn){
  const el=todayElOf();
  if(S.beadDay!==todayIdx()){S.beadDay=todayIdx();S.todayBeads=[];}
  S.todayBeads.push(el);S.luckN++;S.collected.push([ '🪟', WIN_WORDS[el][0], el ]);grow(garden,1);
  // 상생 콤보 (못 맞춰도 손해 없음 — 비처벌)
  let combo=null;
  if(S.lastBeadEl && SHENG[S.lastBeadEl]===el){combo=COMBO_NAME[S.lastBeadEl];}
  S.lastBeadEl=el;save();refreshStat();refreshLuckBadges();
  const w=WIN_WORDS[el][Math.floor(Math.random()*WIN_WORDS[el].length)];
  toast(w);
  if(document.getElementById('sect-luck').classList.contains('on')){buildLuck();
    if(combo){const c=document.getElementById('comboLine');if(c){c.textContent='✨ '+combo;c.classList.add('show');}}
  } else if(combo){toast('✨ '+combo);}
}
function shareWindow(){
  if(!S.todayBeads.length){toast('창을 먼저 두드려 빛을 담아보세요');return;}
  toast('벽서에 걸렸어요 · 오늘 '+S.todayBeads.length+'개의 빛');
}

/* real-base hybrid */
document.getElementById('pickBase').onclick=()=>document.getElementById('baseFile').click();
document.getElementById('baseFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const url=URL.createObjectURL(f);
  if(f.type.startsWith('video')){baseImg=null;const v=document.getElementById('baseVideo');v.src=url;v.play().catch(()=>{});baseVideo=v;baseDirty=true;toast('실사 영상 연결됨');}
  else{baseVideo=null;const im=document.getElementById('baseImg');im.src=url;baseImg=im;im.onload=()=>{baseDirty=true;};toast('실사 사진 연결됨');}};
function clearBase(){baseImg=null;baseVideo=null;baseDirty=true;const v=document.getElementById('baseVideo');v.pause();v.removeAttribute('src');v.load();}
document.getElementById('clearBase').onclick=()=>{clearBase();toast('그림 정원으로');};

/* demo time controls */
document.getElementById('demoVisit').onclick=()=>{S.lastVisit=Date.now()-12*3600*1000;onArrive();toast('하루 지나 다시 방문');};
document.getElementById('demoAway').onclick=()=>{S.lastVisit=Date.now()-4*DAY;save();toast('며칠 비웠어요 — 정원이 기다리는 중');};

/* helpers */
function toast(txt){const t=document.getElementById('toast');document.getElementById('toastText').textContent=txt;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2200);}
function showCap(txt){const c=document.getElementById('cap');document.getElementById('capText').textContent=txt;c.classList.add('show');clearTimeout(showCap._t);showCap._t=setTimeout(()=>c.classList.remove('show'),3800);}
function tickClock(){const d=new Date();document.getElementById('clock').textContent=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

/* ===== 모바일 인터랙션: 흔들기로 빛 모으기 · 길게 눌러 위로 · 햅틱 ===== */
function haptic(ms){if(navigator.vibrate)try{navigator.vibrate(ms);}catch(e){}}
// 흔들기 — 그날 창의 빛이 우수수 떨어짐 (하루 상한 안에서)
let lastShake=0, lastAcc={x:0,y:0,z:0};
function onShake(e){
  const a=e.accelerationIncludingGravity||e.acceleration;if(!a)return;
  const dx=Math.abs((a.x||0)-lastAcc.x),dy=Math.abs((a.y||0)-lastAcc.y),dz=Math.abs((a.z||0)-lastAcc.z);
  lastAcc={x:a.x||0,y:a.y||0,z:a.z||0};
  const force=dx+dy+dz;const now=Date.now();
  if(force>26 && now-lastShake>900){
    lastShake=now;
    if(beadAvailable()){
      const el=todayElOf();
      for(let i=0;i<3;i++)fallingBeads.push({x:W*(0.25+Math.random()*0.5),y0:H*0.2,t:Math.random()*0.2,col:ELMETA[el].bead});
      collectBead(false);haptic(30);
    }
  }
}
function enableMotion(){
  if(window.DeviceMotionEvent){
    if(typeof DeviceMotionEvent.requestPermission==='function'){
      // iOS 13+ — 권한은 사용자 제스처에서 요청
      const ask=()=>{DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('devicemotion',onShake);}).catch(()=>{});document.removeEventListener('click',ask);};
      document.addEventListener('click',ask,{once:true});
    } else { window.addEventListener('devicemotion',onShake); }
  }
}
// 빛 모트 탭 시 햅틱 (collectBead가 호출될 때)
const _origCollect=collectBead;
collectBead=function(fromBtn){haptic(12);return _origCollect(fromBtn);};
// 창을 길게 누르면 오늘의 위로 한마디
let pressTimer=null;
cv.addEventListener('pointerdown',()=>{pressTimer=setTimeout(()=>{const el=todayElOf();const w=WIN_WORDS[el][Math.floor(Math.random()*WIN_WORDS[el].length)];showCap(w);haptic(20);},550);});
['pointerup','pointercancel','pointerleave'].forEach(ev=>cv.addEventListener(ev,()=>{if(pressTimer)clearTimeout(pressTimer);}));

/* boot */
tickClock();setInterval(tickClock,30000);
setTod('day');ensureWeather();buildItems();refreshRich();refreshStat();
onArrive();enableMotion();
document.getElementById('mood').textContent=GARDENS[0].mood;showCap(isPaused()?'기다리고 있었어요. 다시 가꿔봐요 — 사라진 건 없어요.':GARDENS[0].cap);
requestAnimationFrame(frame);
})();
